server {
    listen 80;
    server_name _;

    client_max_body_size 20m;
    sendfile on;
    tcp_nopush on;
    aio on;

    location /assets/ {
        alias /var/www/assets/;
        try_files $uri =404;
        add_header Accept-Ranges bytes always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range,Accept-Ranges" always;
        types {
            video/mp4 mp4;
            video/quicktime mov;
            image/jpeg jpg jpeg;
            image/png png;
            image/webp webp;
        }
        default_type application/octet-stream;
        expires 30d;
        access_log off;
    }

    location / {
        return 404;
    }
}